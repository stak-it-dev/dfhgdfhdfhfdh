<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX OCEAN GASTRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #2E4554; --navy-light: #3F5A69; --beige: #E8E5E1;
            --cream: #F4F2EF; --gold: #c5a059; --white: #FFFFFF;
            --text-dark: #2E4554; --serif: 'Playfair Display', serif; --sans: 'Montserrat', sans-serif;
        }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; background-color: var(--navy); color: var(--white); font-family: var(--sans); overflow: hidden; }
        .container { height: calc(100vh - 75px); overflow-y: auto; padding: 20px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .serif { font-family: var(--serif); }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); display: flex; justify-content: space-around; align-items: center; border-radius: 25px 25px 0 0; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .nav-item { color: var(--navy); text-align: center; font-size: 10px; text-transform: uppercase; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; font-weight: 600; color: var(--gold); }
        .nav-item svg { display: block; margin: 0 auto 5px; width: 22px; height: 22px; }

        /* Brand */
        .brand-header { text-align: center; padding: 20px 0; }
        .brand-header h1 { font-family: var(--serif); font-size: 26px; margin: 0; letter-spacing: 3px; }
        
        /* Categories */
        .cats-sticky { position: sticky; top: -20px; background: var(--navy); z-index: 100; padding: 15px 0; margin: 0 -20px 20px -20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cats-list { display: flex; gap: 20px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; }
        .cat-btn { white-space: nowrap; font-size: 11px; text-transform: uppercase; color: var(--white); opacity: 0.5; padding-bottom: 5px; cursor: pointer; border-bottom: 2px solid transparent; }
        .cat-btn.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 50px; }
        .card { background: var(--beige); border-radius: 20px; padding: 12px; color: var(--text-dark); display: flex; flex-direction: column; transition: 0.3s; }
        .p-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; margin-bottom: 10px; background: #ddd; }
        .p-name { font-family: var(--serif); font-size: 14px; font-weight: 600; height: 34px; overflow: hidden; margin-bottom: 8px; line-height: 1.2; }
        .p-price { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
        .add-btn { background: var(--navy); color: var(--white); border: none; padding: 10px; border-radius: 10px; font-size: 9px; font-weight: 600; text-transform: uppercase; cursor: pointer; }

        /* Cart & Checkout */
        .cart-item { display: flex; gap: 12px; background: var(--beige); padding: 15px; border-radius: 20px; margin-bottom: 15px; color: var(--text-dark); align-items: center; }
        .cart-img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; }
        .cart-info { flex: 1; }
        .cart-ctrl { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--navy); background: none; font-weight: 700; cursor: pointer; }
        
        .checkout-form { margin-top: 25px; }
        .checkout-form input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-order-final { width: 100%; padding: 20px; background: var(--gold); color: var(--navy); border: none; border-radius: 15px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Profile */
        .profile-card { background: var(--navy-light); border-radius: 25px; padding: 35px; text-align: center; }
        .avatar { width: 80px; height: 80px; background: var(--gold); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--navy); font-family: var(--serif); }
        
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- SHOP -->
        <div id="shop-view" class="view active">
            <div class="brand-header"><h1>MAX OCEAN<span>GASTRO</span></h1></div>
            <div class="cats-sticky"><div class="cats-list" id="cat-nav"></div></div>
            <div class="grid" id="product-grid"></div>
        </div>

        <!-- CART -->
        <div id="cart-view" class="view">
            <h2 class="serif" style="font-size: 30px;">Ваш заказ</h2>
            <div id="cart-list"></div>
            <div id="cart-empty" style="text-align: center; margin-top: 60px; opacity: 0.5;">Корзина пуста</div>
            <div id="checkout-block" style="display: none;" class="checkout-form">
                <h3 class="serif">Детали доставки</h3>
                <input type="tel" id="f-phone" placeholder="Телефон: +7 (___) ___-__-__">
                <input type="text" id="f-address" placeholder="Адрес: Город, улица, дом">
                <button class="btn-order-final" onclick="finalizeOrder()">Оформить в MAX</button>
            </div>
        </div>

        <!-- PROFILE -->
        <div id="profile-view" class="view">
            <h2 class="serif" style="font-size: 30px;">MAX ID</h2>
            <div class="profile-card">
                <div class="avatar" id="avatar">?</div>
                <div id="user-name" class="serif" style="font-size: 24px;">MAX Клиент</div>
                <div id="user-id" style="opacity: 0.6; font-size: 13px; margin-top: 5px;">@username</div>
                <div style="margin-top:25px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1); font-size:13px; text-align: left;">
                    <p>Статус: <span style="color:var(--gold);">Premium Guest</span></p>
                    <p>Программа MAX: 5% лояльности</p>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('shop-view', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Меню
        </div>
        <div class="nav-item" onclick="switchTab('cart-view', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>Заказ
        </div>
        <div class="nav-item" onclick="switchTab('profile-view', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>MAX ID
        </div>
    </nav>

    <script>
        const MAX_APP = window.Telegram.WebApp;
        MAX_APP.expand(); MAX_APP.ready();
        
        const API_URL = "https://your-backend-api.com"; // ВАШ URL

        const PRODUCTS = [
            // Рыба целая и стейки
            { id: 1, cat: "Стейки", name: "Тунец Вьетнам стейк", price: 490, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            { id: 2, cat: "Стейки", name: "Форель Карелия стейк", price: 1190, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            { id: 3, cat: "Стейки", name: "Семга Чили стейк", price: 1750, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=400" },
            { id: 4, cat: "Стейки", name: "Дорадо Турция", price: 1030, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            { id: 5, cat: "Стейки", name: "Сибас Турция", price: 1050, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            { id: 6, cat: "Стейки", name: "Скумбрия Атлантика", price: 630, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=400" },
            { id: 7, cat: "Стейки", name: "Форель Карелия (целая)", price: 1050, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            { id: 8, cat: "Стейки", name: "Морская Форель (целая)", price: 1200, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            // Морепродукты
            { id: 9, cat: "Морепродукты", name: "Креветка Королевская 40/60", price: 790, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=400" },
            { id: 10, cat: "Морепродукты", name: "Филе кальмара", price: 790, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 11, cat: "Морепродукты", name: "Морской коктейль", price: 430, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=400" },
            { id: 12, cat: "Морепродукты", name: "Креветка Арктида 31/40", price: 1196, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 13, cat: "Морепродукты", name: "Мясо мидий", price: 351, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=400" },
            { id: 14, cat: "Морепродукты", name: "Креветка Ваннамей 30/40", price: 1690, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 15, cat: "Морепродукты", name: "Северная креветка", price: 1650, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=400" },
            { id: 16, cat: "Морепродукты", name: "Салатное мясо краба", price: 2200, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 17, cat: "Морепродукты", name: "Лангустины L2", price: 1500, img: "https://images.unsplash.com/photo-1559742811-822873691df8?q=80&w=400" },
            { id: 18, cat: "Морепродукты", name: "Креветка Ваннамей Бабочка", price: 590, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 19, cat: "Морепродукты", name: "Филе гребешка", price: 1190, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            { id: 20, cat: "Морепродукты", name: "Кальмар Командорский", price: 850, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            // Филе и Фарш
            { id: 21, cat: "Филе/Фарш", name: "Тилапия филе", price: 496, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=400" },
            { id: 22, cat: "Филе/Фарш", name: "Горбуша фарш 400г", price: 209, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            { id: 23, cat: "Филе/Фарш", name: "Семга фарш 400г", price: 403, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            { id: 24, cat: "Филе/Фарш", name: "Лосось Трим С", price: 1910, img: "https://images.unsplash.com/photo-1544070282-3915272ef411?q=80&w=400" },
            { id: 25, cat: "Филе/Фарш", name: "Филе минтая", price: 530, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            { id: 26, cat: "Филе/Фарш", name: "Филе окуня", price: 730, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            // Икра и прочее
            { id: 27, cat: "Икра", name: "Икра форели 250г", price: 1690, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 28, cat: "Икра", name: "Икра кеты 200г", price: 1430, img: "https://images.unsplash.com/photo-1580552834319-0357639a037b?q=80&w=400" },
            { id: 29, cat: "Икра", name: "Икра нерки 200г", price: 1430, img: "https://images.unsplash.com/photo-1534604973900-c41ab4c9d3ba?q=80&w=400" },
            { id: 30, cat: "Икра", name: "Мясо клешни краба", price: 910, img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=400" },
            // Полуфабрикаты
            { id: 31, cat: "П/Ф", name: "Кольца кальмара", price: 690, img: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?q=80&w=400" },
            { id: 32, cat: "П/Ф", name: "Котлеты тресковые", price: 379, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" },
            // Фастфуд
            { id: 33, cat: "Фастфуд", name: "Пицца Пепперони", price: 275, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=400" },
            { id: 34, cat: "Фастфуд", name: "Картофель фри 1кг", price: 931, img: "https://images.unsplash.com/photo-1518013030457-0471d7d91dfc?q=80&w=400" },
            // Бакалея
            { id: 35, cat: "Масло", name: "Масло 82.5% 500г", price: 679, img: "https://images.unsplash.com/photo-1589985270826-4b7bb135bc9d?q=80&w=400" },
            { id: 36, cat: "Слабая соль", name: "Лосось филе кусок", price: 189, img: "https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=400" }
        ];

        let cart = JSON.parse(localStorage.getItem('max_cart_v4')) || [];
        let currentCat = "Все";

        function init() {
            const user = MAX_APP.initDataUnsafe?.user;
            if(user) {
                document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                document.getElementById('user-id').innerText = "@" + (user.username || "MAX-ID-" + user.id);
                document.getElementById('avatar').innerText = user.first_name[0];
            }
            renderCats(); renderProducts(); updateCartUI();
        }

        function renderCats() {
            const cats = ["Все", ...new Set(PRODUCTS.map(p => p.cat))];
            document.getElementById('cat-nav').innerHTML = cats.map(c => `
                <div class="cat-btn ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</div>
            `).join('');
        }

        function setCat(c) { currentCat = c; renderCats(); renderProducts(); }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = currentCat === "Все" ? PRODUCTS : PRODUCTS.filter(p => p.cat === currentCat);
            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <img src="${p.img}" class="p-img">
                    <div class="p-name serif">${p.name}</div>
                    <div class="p-price">${p.price} ₽</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if(inCart) inCart.qty++; else cart.push({...p, qty: 1});
            MAX_APP.HapticFeedback.impactOccurred('medium');
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem('max_cart_v4', JSON.stringify(cart));
            const list = document.getElementById('cart-list');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            if(cart.length > 0) {
                document.getElementById('cart-empty').style.display = 'none';
                document.getElementById('checkout-block').style.display = 'block';
                list.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <img src="${i.img}" class="cart-img">
                        <div class="cart-info">
                            <h4 class="serif">${i.name}</h4>
                            <div style="font-weight:600;">${i.price} ₽</div>
                        </div>
                        <div class="cart-ctrl">
                            <button class="qty-btn" onclick="changeQty(${i.id}, -1)">-</button>
                            <span>${i.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('cart-empty').style.display = 'block';
                document.getElementById('checkout-block').style.display = 'none';
                list.innerHTML = '';
            }
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.id === id);
            item.qty += delta;
            if(item.qty <= 0) cart = cart.filter(x => x.id !== id);
            updateCartUI();
        }

        async function finalizeOrder() {
            const phone = document.getElementById('f-phone').value;
            const address = document.getElementById('f-address').value;
            if(!phone || !address) return MAX_APP.showAlert("Заполните данные для доставки");
            const btn = document.querySelector('.btn-order-final');
            btn.innerText = "ОБРАБОТКА..."; btn.disabled = true;
            const orderData = {
                user_id: MAX_APP.initDataUnsafe?.user?.id || 0,
                username: MAX_APP.initDataUnsafe?.user?.username || "MAX_GUEST",
                items: cart, total: cart.reduce((s, i) => s + (i.price * i.qty), 0),
                phone, address
            };
            try {
                const res = await fetch(`${API_URL}/api/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });
                if(res.ok) {
                    MAX_APP.showConfirm("Заказ принят MAX! Очистить корзину?", (ok) => { cart = []; updateCartUI(); });
                }
            } catch (e) {
                MAX_APP.showAlert("Ошибка связи с сервером");
            } finally {
                btn.innerText = "ОФОРМИТЬ В MAX"; btn.disabled = false;
            }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            MAX_APP.HapticFeedback.selectionChanged();
        }

        init();
    </script>
</body>
</html>
